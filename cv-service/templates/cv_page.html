<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Lluís Noval</title>
    <meta name="description" content="Currículum multilingüe de Lluís Noval. Previsualitza i descarrega el PDF en català, castellà o anglès.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="CV - Lluís Noval">
    <meta property="og:description" content="Currículum multilingüe de Lluís Noval. Previsualitza i descarrega el PDF.">
    <meta property="og:image" content="assets/photo.webp">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CV - Lluís Noval">
    <meta name="twitter:description" content="Currículum multilingüe de Lluís Noval.">
    <meta name="twitter:image" content="assets/photo.webp">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <style>
        :root {
            --teal: #0d4d4d;
            --teal-light: #0f6b6b;
            --bg-gradient: linear-gradient(135deg, #e8e8e8 0%, #d4e7f5 100%);
            --card-bg: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
        }

        .cv-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        .cv-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .cv-header__info h1 {
            margin: 0;
            color: var(--teal);
            font-size: 32px;
        }

        .cv-header__info p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 16px;
        }

        .cv-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .lang-tabs {
            display: inline-flex;
            background: #ffffff;
            border-radius: 999px;
            padding: 4px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        .lang-tabs button {
            border: none;
            background: transparent;
            padding: 8px 16px;
            font-weight: 600;
            color: var(--muted);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-tabs button.active {
            background: var(--teal);
            color: #ffffff;
        }

        .download-btn {
            background: var(--teal);
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .download-btn:hover {
            background: var(--teal-light);
        }

        .cv-content {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 80vh;
            min-height: 600px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .mobile-canvas {
            width: 100%;
            display: none;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(13, 77, 77, 0.2);
            border-top-color: var(--teal);
            animation: spin 1s linear infinite;
            display: none;
        }

        .spinner.visible {
            display: block;
        }

        .cv-footer {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            color: var(--muted);
            font-size: 14px;
        }

        .cv-footer a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @media (max-width: 900px) {
            .iframe-wrapper {
                height: auto;
                min-height: unset;
                border: none;
            }

            iframe {
                display: none;
            }

            .mobile-canvas {
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="cv-wrapper">
        <header class="cv-header">
            <div class="cv-header__info">
                <h1>Lluís Noval</h1>
                <p>Estudiant ASIX | Cloud Enthusiast</p>
            </div>
            <div class="cv-actions">
                <div class="lang-tabs" role="tablist" aria-label="Language selector">
                    <button type="button" data-lang="ca" class="active" role="tab" aria-selected="true">CA</button>
                    <button type="button" data-lang="es" role="tab" aria-selected="false">ES</button>
                    <button type="button" data-lang="en" role="tab" aria-selected="false">EN</button>
                </div>
                <a class="download-btn" id="download-btn" href="download/ca" download>
                    Descarregar CV (PDF)
                </a>
            </div>
        </header>

        <section class="cv-content">
            <div class="iframe-wrapper" id="iframe-wrapper">
                <iframe id="cv-iframe" src="preview/ca" title="CV preview"></iframe>
                <div class="spinner" id="spinner"></div>
            </div>
            <div class="mobile-canvas" id="mobile-canvas">
                <!-- Canvas elements are created dynamically by cv.js for multi-page support -->
            </div>
        </section>

        <footer class="cv-footer">
            <span id="visit-count">Visites: --</span>
            <a href="https://lnoval.dev/" aria-label="Back to home">← Inici</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="static/cv.js"></script>
</body>
</html>
