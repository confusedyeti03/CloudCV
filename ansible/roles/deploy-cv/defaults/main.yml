---
# =============================================================================
# Role: deploy-cv - Default Variables
# =============================================================================
# Purpose: Configuration for the FastAPI cv-service
# =============================================================================

# Directory where the service is installed
cv_service_path: /opt/cv-service

# Port where uvicorn listens (Nginx proxies from /api/)
cv_service_port: 8000

# Host where it listens (127.0.0.1 = local only, secure behind Nginx)
cv_service_host: "127.0.0.1"
