---
# =============================================================================
# Role: anubis - Default Variables
# =============================================================================
# Purpose: Configuration for Anubis WAF with Proof-of-Work
#
# IMPORTANT: This is an OPTIONAL component for learning purposes.
# If it causes problems, you can run the playbook with --skip-tags "anubis"
# =============================================================================

# Anubis version to download
# Check latest version at: https://github.com/TecharoHQ/anubis/releases
anubis_version: "1.16.0"

# Proof-of-Work difficulty (number of zeros in hash)
# 4 = ~1-2 seconds on modern CPU (good balance)
# 5 = ~3-5 seconds (more secure but may annoy users)
anubis_difficulty: 4

# Address and port where Anubis listens
# 127.0.0.1 = localhost only (secure)
anubis_bind: "127.0.0.1:8923"

# Backend to redirect to after the challenge
# Can be Nginx or directly the application
anubis_target: "http://127.0.0.1:8080"
