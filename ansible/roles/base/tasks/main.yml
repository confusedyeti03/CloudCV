# =============================================================================
# Role: base - Basic Server Configuration
# =============================================================================
# Author: CloudCV
# Target: Debian 12 ARM64 (t4g.nano)
# Description: Install essential packages and configure base system
#
# This is the first layer of server configuration:
# - Package updates
# - Essential tools installation
# - Timezone and locale configuration
# - Swap verification (created by Terraform)
# =============================================================================
---
# -----------------------------------------------------------------------------
# APT: System Updates
# -----------------------------------------------------------------------------

# Update apt cache to get latest package info
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [base, apt]

# Upgrade system packages to latest versions
- name: Upgrade system packages
  ansible.builtin.apt:
    upgrade: dist
  tags: [base, apt]

# -----------------------------------------------------------------------------
# PACKAGES: Essential Tools
# -----------------------------------------------------------------------------

# Install essential packages for server management
- name: Install essential packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
      - curl
      - wget
      - htop
      - vim
      - unzip
      - rsync
    state: present
  tags: [base, packages]

# -----------------------------------------------------------------------------
# TIMEZONE: Time Configuration
# -----------------------------------------------------------------------------

# Set timezone to Europe/Madrid (Spanish time)
- name: Set timezone to Europe/Madrid
  ansible.builtin.timezone:
    name: Europe/Madrid
  tags: [base, timezone]

# -----------------------------------------------------------------------------
# LOCALE: Language Configuration (Catalan)
# -----------------------------------------------------------------------------

# Generate Catalan locale ca_ES.UTF-8
- name: Generate Catalan locale
  ansible.builtin.locale_gen:
    name: ca_ES.UTF-8
    state: present
  tags: [base, locale]

# Set default system locale
- name: Set default system locale
  ansible.builtin.lineinfile:
    path: /etc/default/locale
    create: yes
    line: "LANG=ca_ES.UTF-8"
    regexp: "^LANG="
  tags: [base, locale]

# Ensure LC_ALL for locale consistency
- name: Set LC_ALL system locale
  ansible.builtin.lineinfile:
    path: /etc/default/locale
    create: yes
    line: "LC_ALL=ca_ES.UTF-8"
    regexp: "^LC_ALL="
  tags: [base, locale]

# -----------------------------------------------------------------------------
# AWS SSM AGENT (Debian requires manual install)
# -----------------------------------------------------------------------------

- name: Download AWS SSM Agent
  ansible.builtin.get_url:
    url: "https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/debian_arm64/amazon-ssm-agent.deb"
    dest: "/tmp/amazon-ssm-agent.deb"
  tags: [base, ssm]

- name: Install AWS SSM Agent
  ansible.builtin.apt:
    deb: "/tmp/amazon-ssm-agent.deb"
  tags: [base, ssm]

- name: Ensure AWS SSM Agent is running
  ansible.builtin.service:
    name: amazon-ssm-agent
    state: started
    enabled: yes
  tags: [base, ssm]

# -----------------------------------------------------------------------------
# SWAP: Verification (already created by Terraform user_data)
# -----------------------------------------------------------------------------

# Verify swap is active (created by Terraform)
# 1GB swap is required for t4g.nano (512MB RAM) with Anubis + WeasyPrint
- name: Verify swap is active
  ansible.builtin.command: swapon --show --noheadings
  register: swap_status
  changed_when: false
  failed_when: swap_status.stdout | trim == ""
  tags: [base, swap]

# -----------------------------------------------------------------------------
# HOSTNAME: Server Name
# -----------------------------------------------------------------------------

# Set server hostname to cloudcv
- name: Set hostname to cloudcv
  ansible.builtin.hostname:
    name: cloudcv
  tags: [base, hostname]
