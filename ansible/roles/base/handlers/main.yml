# =============================================================================
# Role: base - Handlers
# =============================================================================
# Purpose: Handle service restarts for base system configuration
# Note: This role doesn't require many handlers - services are managed elsewhere
# =============================================================================
---
# Base system handlers

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

# Restart time sync service if needed
- name: restart systemd-timesyncd
  ansible.builtin.service:
    name: systemd-timesyncd
    state: restarted
