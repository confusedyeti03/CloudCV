---
- name: Download CloudWatch agent (ARM64 Debian)
  ansible.builtin.get_url:
    url: https://amazoncloudwatch-agent.s3.amazonaws.com/debian/arm64/latest/amazon-cloudwatch-agent.deb
    dest: /tmp/amazon-cloudwatch-agent.deb
    mode: "0644"

- name: Install CloudWatch agent package
  ansible.builtin.apt:
    deb: /tmp/amazon-cloudwatch-agent.deb

- name: Copy CloudWatch agent config
  ansible.builtin.copy:
    src: amazon-cloudwatch-agent.json
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart amazon-cloudwatch-agent

- name: Enable and start CloudWatch agent
  ansible.builtin.service:
    name: amazon-cloudwatch-agent
    enabled: true
    state: started
