# =============================================================================
# Certbot Role - Let's Encrypt SSL Certificates
# =============================================================================
# PURPOSE: Install Certbot and obtain/renew SSL certificates
# =============================================================================

---
- name: Install Certbot and Nginx plugin
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

- name: Check if certificate already exists
  stat:
    path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  register: cert_exists

- name: Obtain SSL certificate (initial)
  command: >
    certbot certonly --nginx
    -d {{ domain }}
    -d www.{{ domain }}
    --email {{ certbot_email }}
    --agree-tos
    --non-interactive
    --redirect
  when: not cert_exists.stat.exists
  notify: reload nginx

- name: Deploy full SSL Nginx config
  template:
    src: "{{ playbook_dir }}/../roles/nginx/templates/cloudcv.conf.j2"
    dest: "/etc/nginx/sites-available/{{ domain }}"
    owner: root
    group: root
    mode: '0644'
  when: cert_exists.stat.exists or not cert_exists.stat.exists
  notify: reload nginx

- name: Ensure Certbot auto-renewal timer is enabled
  systemd:
    name: certbot.timer
    state: started
    enabled: yes

- name: Test Certbot renewal (dry run)
  command: certbot renew --dry-run
  register: certbot_dry_run
  changed_when: false
  failed_when: false

- name: Display Certbot renewal test result
  debug:
    msg: "Certbot renewal dry-run: {{ 'SUCCESS' if certbot_dry_run.rc == 0 else 'NEEDS ATTENTION' }}"
