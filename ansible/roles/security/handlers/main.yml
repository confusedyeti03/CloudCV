# =============================================================================
# Role: security - Handlers
# =============================================================================
# Purpose: Handle service restarts and config validation
# =============================================================================
---
# Restart SSH daemon after config changes
- name: restart sshd
  ansible.builtin.service:
    name: ssh
    state: restarted

# Validate SSH config before restarting (prevents lockout)
- name: validate sshd config
  ansible.builtin.command: /usr/sbin/sshd -t
  listen: validate sshd config
  notify:
    - restart sshd

# Restart fail2ban after jail config changes
- name: restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
