# =============================================================================
# Ansible Configuration for CloudCV
# =============================================================================
# Purpose: Global Ansible configuration (inventory, SSH connection, privileges)
#
# SSH Configuration:
# - Port: 2222 (defined in inventory)
# - User: admin (Debian AMI)
# - Key: labsuser.pem (AWS Academy vockey)
#
# Verify connection:
#   ansible cloudcv -m ping
# =============================================================================

[defaults]
# Path to inventory (hosts.yml)
inventory = inventory/hosts.yml

# Disable retry files (not needed)
retry_files_enabled = False

# Don't verify host key (new server each terraform apply)
host_key_checking = False

# SSH connection timeout
timeout = 30

# Default user (Debian AMI)
remote_user = admin

# AWS Academy SSH key (vockey)
# IMPORTANT: Update this path with the real location of labsuser.pem
private_key_file = ~/.ssh/labsuser.pem

[privilege_escalation]
# Run as root with sudo
become = True
become_method = sudo
become_user = root
become_ask_pass = False
