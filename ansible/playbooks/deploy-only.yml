# =============================================================================
# Deploy Only Playbook - Quick Deployments
# =============================================================================
# Purpose: Playbook for quick deployments without reconfiguring the server
#
# Usage:
#   ansible-playbook playbooks/deploy-only.yml
#   ansible-playbook playbooks/deploy-only.yml --tags "landing"  # Web only
#   ansible-playbook playbooks/deploy-only.yml --tags "cv"  # API only
#
# When to use:
# - You've changed HTML/CSS/JS files in web/
# - You've changed Python code in cv-service/
# - You have NOT changed server configuration (nginx, security, etc.)
#
# Advantage: Much faster than site.yml (skips base, security, nginx config)
# =============================================================================
---
- name: Deploy CloudCV applications only
  hosts: cloudcv
  become: yes
  
  # Only execute deployment roles
  roles:
    - role: deploy-landing
      tags: [deploy, landing, web]
    
    - role: deploy-cv
      tags: [deploy, cv, api]
  
  # -------------------------------------------------------------------------
  # POST-TASKS: Quick verification
  # -------------------------------------------------------------------------
  post_tasks:
    # Reload nginx to apply static changes
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
      tags: [deploy]
    
    # Verify that the API responds
    - name: Verify API health
      ansible.builtin.uri:
        url: "http://127.0.0.1:8000/health"
        return_content: yes
      register: api_health
      tags: [deploy, verify]
    
    # Display result
    - name: Display deployment result
      ansible.builtin.debug:
        msg: |
          OK: Deployment completed!
          
          API Status: {{ api_health.json.status | default('unknown') }}
          
          Next steps:
          - Verify https://lnoval.dev
          - Test PDF download
          - Check visit counter
      tags: [deploy, verify]
