# =============================================================================
# Main Playbook - Full Infrastructure Setup
# =============================================================================
# Purpose: Main playbook that executes all roles in order
#
# Usage:
#   ansible-playbook playbooks/site.yml
#   ansible-playbook playbooks/site.yml --tags "deploy"  # Deploy only
#   ansible-playbook playbooks/site.yml --skip-tags "anubis"  # Without Anubis
#
# EXECUTION ORDER (important!):
# 1. base: Install system dependencies and configure locale
# 2. security: Configure UFW firewall, fail2ban and SSH hardening
# 3. anubis: WAF with Proof-of-Work (optional, for learning)
# 4. nginx: Web server and reverse proxy with rate limiting
# 5. certbot: SSL certificates from Let's Encrypt
# 6. deploy-landing: Deploy static content (HTML, CSS, JS)
# 7. deploy-cv: Deploy FastAPI service (API and PDF generation)
# 8. cloudwatch: CloudWatch agent for monitoring and logs
#
# Post-deploy verification:
# - All services must be running
# - API health check
# =============================================================================
---
- name: Configure CloudCV infrastructure
  hosts: cloudcv
  become: yes
  
  # Global variables for all roles
  vars:
    ansible_python_interpreter: /usr/bin/python3
  
  roles:
    # Layer 1: Base system
    - role: base
      tags: [base, system]
    
    # Layer 2: Security
    - role: security
      tags: [security, firewall]
    
    # Layer 3: WAF (optional - for learning)
    - role: anubis
      tags: [anubis, waf]
    
    # Layer 4: Web server
    - role: nginx
      tags: [nginx, web]
    
    # Layer 5: SSL Certificates
    - role: certbot
      tags: [certbot, ssl]
    
    # Layer 6: Deployment
    - role: deploy-landing
      tags: [deploy, landing]
    
    - role: deploy-cv
      tags: [deploy, cv, api]
    
    # Layer 7: Monitoring
    - role: cloudwatch
      tags: [cloudwatch, monitoring]
  
  # -------------------------------------------------------------------------
  # POST-TASKS: Final verification
  # -------------------------------------------------------------------------
  post_tasks:
    # Verify that all critical services are running
    - name: Verify all services are running
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - cv-service
        - fail2ban
        - amazon-cloudwatch-agent
      tags: [verify]
    
    # Verify SSL certificate
    - name: Check SSL certificate validity
      ansible.builtin.command: >
        openssl x509 -in /etc/letsencrypt/live/{{ domain }}/fullchain.pem -noout -dates
      register: ssl_dates
      changed_when: false
      failed_when: false
      tags: [verify]
    
    # Display deployment summary
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ✓ CloudCV deployed successfully!
          
          URLs:
            Landing:  https://{{ domain }}
            CV:       https://{{ domain }}/cv/
            Projects: https://{{ domain }}/portfolio/
            API:      https://{{ domain }}/api/health
          
          SSL Certificate:
            {{ ssl_dates.stdout | default('Not installed yet') }}
          
          Active services: nginx, cv-service, fail2ban, amazon-cloudwatch-agent, certbot.timer
      tags: [verify]
