# =============================================================================
# Ansible Inventory - CloudCV Hosts
# =============================================================================
# Purpose: Define target hosts (EC2 instance)
#
# Configuration:
# 1. Run: terraform apply
# 2. Get IP: terraform output public_ip
# 3. Replace <EIP> with the real IP
# 4. Verify: ansible cloudcv -m ping
#
# SSH Connection:
#   ssh -i ~/.ssh/labsuser.pem -p 2222 admin@<EIP>
# =============================================================================

[cloudcv]
# Replace <EIP> with the public IP from terraform output
lnoval.dev ansible_host=<EIP> ansible_port=2222 ansible_user=admin

[cloudcv:vars]
# Python 3 by default on Debian 12
ansible_python_interpreter=/usr/bin/python3
domain=lnoval.dev
certbot_email=llnovaljuanola@gmail.com
