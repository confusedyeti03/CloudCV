# =============================================================================
# Global Variables - All Hosts
# =============================================================================
# Purpose: Global variables shared by all hosts
#
# These variables apply to all hosts defined in the inventory.
# They are the base that specific group_vars can override.
# =============================================================================
---
# -----------------------------------------------------------------------------
# DOMAIN: Website configuration
# -----------------------------------------------------------------------------

# Main domain (registered on Cloudflare DNS)
domain: lnoval.dev

# Administrator email (for notifications and Let's Encrypt certificates)
certbot_email: llnovaljuanola@gmail.com

# -----------------------------------------------------------------------------
# SYSTEM: Server configuration
# -----------------------------------------------------------------------------

# Server timezone
timezone: Europe/Madrid

# Default locale (Catalan)
locale: ca_ES.UTF-8

# -----------------------------------------------------------------------------
# PATHS: Service directories
# -----------------------------------------------------------------------------

# Web root directory (static content)
web_root: /var/www/cloudcv

# API service directory (FastAPI)
api_root: /opt/cv-service

# -----------------------------------------------------------------------------
# NGINX: Web server configuration
# -----------------------------------------------------------------------------

# Domain for Nginx virtual host
nginx_domain: "{{ domain }}"

# Web root for static files
nginx_web_root: "{{ web_root }}"

# Backend API URL
nginx_api_backend: "http://127.0.0.1:8000"
