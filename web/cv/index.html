<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Lluís Noval</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .hero-card {
            width: min(900px, 100%);
            gap: 24px;
        }

        .cv-header {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            text-align: left;
        }

        .cv-header h1 {
            text-align: center;
            margin-bottom: 0;
        }

        .cv-downloads {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .cv-download-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .cv-download-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .cv-viewer {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            background: white;
            height: 800px;
            width: 100%;
            box-shadow: 0 16px 40px rgba(13, 77, 77, 0.25);
        }

        .cv-viewer embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .hero-card {
                width: min(640px, 100%);
            }

            .cv-viewer {
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <nav class="pill-nav" aria-label="Main navigation">
        <a href="/" class="pill-link">Home</a>
        <a href="/cv/" class="pill-link is-active">CV</a>
        <a href="/portfolio/" class="pill-link">Portfolio</a>
    </nav>

    <main class="page">
        <div class="cv-page">
            <div class="cv-header">
                <h1 class="cv-title">Curriculum Vitae</h1>
                <div class="cv-downloads">
                    <a href="/cv/cv_ca.pdf" download="Lluís_Noval_CV_CA.pdf" class="cv-download-btn">📥 Català</a>
                    <a href="/cv/cv_en.pdf" download="Lluis_Noval_CV_EN.pdf" class="cv-download-btn">📥 English</a>
                    <a href="/cv/cv_es.pdf" download="Lluis_Noval_CV_ES.pdf" class="cv-download-btn">📥 Español</a>
                </div>
            </div>

            <div class="cv-viewer">
                <embed src="/cv/cv_ca.pdf" type="application/pdf">
            </div>
        </div>
    </main>

    <script src="/scripts/visits.js"></script>
</body>
</html>
